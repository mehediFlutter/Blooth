name: blooth
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_blue_plus: ^2.3.9
  lottie: ^3.3.3
  get: ^4.7.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


flutter:

  uses-material-design: true

  assets:
    - assets/icons/
    - assets/lottie/
    - assets/font/

  fonts:
    - family: GreatVibes
      fonts:
        - asset: assets/font/GreatVibes-Regular.ttf
 
